<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="470" viewBox="0 0 1100 470" font-family="Menlo, monospace">
  <rect width="1100" height="470" fill="#0B1220"/>
  <text x="60" y="50" font-size="23" font-weight="bold" fill="#E2E8F0">Read the field you want, skip the rest</text>
  <text x="60" y="76" font-size="14" fill="#94A3B8">A JSON Pointer walks native simdjson straight to one value. The bytes it steps over never become Dart objects.</text>

  <!-- the JSON document, most of it dim, two fields lit -->
  <rect x="60" y="110" width="560" height="320" rx="10" fill="#0E1A2E" stroke="#1E3A5F"/>
  <g font-size="15">
    <text x="84" y="146" fill="#334155">{</text>
    <text x="104" y="176" fill="#334155">"id": 90421,</text>
    <text x="104" y="204" fill="#334155">"meta": { "ts": 1720, "src": "api", ... },</text>
    <text x="104" y="232" fill="#38BDF8">"user": { "name": </text><text x="316" y="232" fill="#38BDF8" font-weight="bold">"ada"</text><text x="372" y="232" fill="#38BDF8">, ... },</text>
    <text x="104" y="260" fill="#334155">"items": [ { ... }, { ... }, { ... }, ... ],</text>
    <text x="104" y="288" fill="#334155">"scores": [ 12, 44, 91, 7, 63, ... ],</text>
    <text x="104" y="316" fill="#38BDF8">"total": </text><text x="196" y="316" fill="#38BDF8" font-weight="bold">1250</text><text x="230" y="316" fill="#38BDF8">,</text>
    <text x="104" y="344" fill="#334155">"raw": "…8 KB of base64…",</text>
    <text x="104" y="372" fill="#334155">"trace": [ ... ], "flags": { ... }</text>
    <text x="84" y="400" fill="#334155">}</text>
  </g>

  <!-- pointer callouts to the lit fields -->
  <path d="M700 232 L392 232" stroke="#38BDF8" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <path d="M700 316 L250 316" stroke="#38BDF8" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#38BDF8"/></marker></defs>
  <rect x="700" y="212" width="330" height="40" rx="7" fill="#111C2E" stroke="#38BDF8"/><text x="716" y="237" font-size="14" fill="#E2E8F0">doc.at('/user/name').stringValue</text>
  <rect x="700" y="296" width="330" height="40" rx="7" fill="#111C2E" stroke="#38BDF8"/><text x="716" y="321" font-size="14" fill="#E2E8F0">doc.at('/total').intValue</text>

  <text x="700" y="384" font-size="13.5" fill="#94A3B8">items, scores, raw and trace are never</text>
  <text x="700" y="404" font-size="13.5" fill="#94A3B8">parsed into Dart, so selective reads run</text>
  <text x="700" y="424" font-size="13.5" fill="#94A3B8">5 to 14x faster than jsonDecode.</text>
  <text x="60" y="452" font-size="12.5" fill="#64748B">simdjson is vendored and compiled by build hooks; simdJsonDecodeBytes is there when you do need the whole thing.</text>
</svg>
